name: Odysseus APK Strike
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
      - name: install pake
        run: npm install && npm run build
      - name: build odysseus apk
        run: |
          node dist/cli.js "https://nexus-relay-production.up.railway.app" --name "Odysseus" --icon src-tauri/icons/icon.png
